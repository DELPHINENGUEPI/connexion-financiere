<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Financière</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a1f44, #111);
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .cta {
      margin-top: 20px;
      padding: 15px 25px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      border-radius: 10px;
      cursor: pointer;
    }

    .form-box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      display: none;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Connexion Financière</h1>
  <p>Opportunités financières et emploi au Canada</p>
  <button class="cta" onclick="start()">Commencer</button>
</div>

<!-- CHOIX -->
<div class="section hidden" id="choice">
  <h2>Choisissez votre objectif</h2>

  <div class="card" onclick="setType('client')">💰 Finances</div>
  <div class="card" onclick="setType('emploi')">👥 Emploi</div>
</div>

<!-- FORM -->
<div class="section">
  <div class="form-box" id="form">

    <input type="text" id="name" placeholder="Nom complet">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Téléphone">

    <select id="gender">
      <option value="">Sexe</option>
      <option>Homme</option>
      <option>Femme</option>
    </select>

    <select id="status">
      <option value="Étudiant">Étudiant</option>
      <option value="Travailleur">Travailleur</option>
      <option value="Résident permanent">Résident permanent</option>
      <option value="Citoyen">Citoyen</option>
    </select>

    <select id="location">
      <option value="Zoom">Zoom</option>
      <option value="Laval">Laval</option>
    </select>

    <label>
      <input type="checkbox" id="consent"> J'accepte d'être contacté
    </label>

    <button onclick="submitForm()">Recevoir code</button>
  </div>

  <!-- OTP -->
  <div class="form-box hidden" id="otpBox">
    <input type="text" id="otp" placeholder="Code OTP reçu">
    <button onclick="verifyOTP()">Valider</button>
  </div>

  <!-- SUCCESS -->
  <div class="hidden" id="success">
    <h2>Merci ✅</h2>
    <p>Nous vous contacterons bientôt</p>
  </div>
</div>

<script>
    const registrationForm = document.querySelector('form'); // Assure-toi d'avoir une balise <form>

    registrationForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Empêche le rechargement de la page

        // Récupération des données du formulaire
        const formData = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('http://localhost:8080/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            const result = await response.json();

            if (result.status === "SUCCESS") {
                alert("Félicitations ! " + result.message);
                // Optionnel : rediriger vers la page de login
                // window.location.href = "login.html";
            } else {
                alert("Erreur : " + result.message);
            }
        } catch (error) {
            console.error("Erreur de connexion au serveur :", error);
            alert("Le serveur ne répond pas. Vérifie qu'il est bien lancé !");
        }
    });
</script>
</body>
</html>
