<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Financière</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a1f44, #111);
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .cta {
      margin-top: 20px;
      padding: 15px 25px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      border-radius: 10px;
      cursor: pointer;
    }

    .form-box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      display: none;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>Connexion Financière</h1>
  <p>Opportunités financières et emploi au Canada</p>
  <button class="cta" onclick="start()">Commencer</button>
</div>

<!-- CHOIX -->
<div class="section hidden" id="choice">
  <h2>Choisissez votre objectif</h2>

  <div class="card" onclick="setType('client')">💰 Finances</div>
  <div class="card" onclick="setType('emploi')">👥 Emploi</div>
</div>

<!-- FORM -->
<div class="section">
  <div class="form-box" id="form">

    <input type="text" id="name" placeholder="Nom complet">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Téléphone">

    <select id="gender">
      <option value="">Sexe</option>
      <option>Homme</option>
      <option>Femme</option>
    </select>

    <select id="status">
      <option value="Étudiant">Étudiant</option>
      <option value="Travailleur">Travailleur</option>
      <option value="Résident permanent">Résident permanent</option>
      <option value="Citoyen">Citoyen</option>
    </select>

    <select id="location">
      <option value="Zoom">Zoom</option>
      <option value="Laval">Laval</option>
    </select>

    <label>
      <input type="checkbox" id="consent"> J'accepte d'être contacté
    </label>

    <button onclick="submitForm()">Recevoir code</button>
  </div>

  <!-- OTP -->
  <div class="form-box hidden" id="otpBox">
    <input type="text" id="otp" placeholder="Code OTP reçu">
    <button onclick="verifyOTP()">Valider</button>
  </div>

  <!-- SUCCESS -->
  <div class="hidden" id="success">
    <h2>Merci ✅</h2>
    <p>Nous vous contacterons bientôt</p>
  </div>
</div>

<script>

let type = "";
let emailGlobal = "";

/* START : Masquer le héros et afficher le choix */
function start(){
  document.getElementById("hero").style.display = "none";
  document.getElementById("choice").classList.remove("hidden");
}

/* TYPE : Définir l'objectif et afficher le formulaire */
function setType(t){
  type = t;
  document.getElementById("choice").classList.add("hidden");
  document.getElementById("form").style.display = "block";
}

/* SUBMIT FORM : Envoyer les données au backend */
function submitForm(){

  const data = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    gender: document.getElementById("gender").value,
    status: document.getElementById("status").value,
    location: document.getElementById("location").value,
    consent: document.getElementById("consent").checked,
    type: type
  };

  // Validation simple
  if(!data.name || !data.email || !data.phone || !data.gender){
    alert("❌ Veuillez remplir tous les champs obligatoires.");
    return;
  }

  emailGlobal = data.email;

  // Feedback visuel sur le bouton
  const btn = document.querySelector("#form button");
  const originalText = btn.innerText;
  btn.innerText = "Envoi en cours...";
  btn.disabled = true;

  fetch("https://connexion-financiere.onrender.com/api/prospect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
  })
  .then(response => {
      if (!response.ok) throw new Error("Erreur serveur");
      return response.json();
  })
  .then(result => {
      if (result.status === "OTP_SENT") {
          document.getElementById("form").style.display = "none";
          document.getElementById("otpBox").classList.remove("hidden");
      } else {
          alert("Erreur : " + result.status);
          btn.innerText = originalText;
          btn.disabled = false;
      }
  })
  .catch(err => {
      console.error(err);
      alert("Impossible de contacter le serveur. Vérifiez votre connexion.");
      btn.innerText = originalText;
      btn.disabled = false;
  });
}

/* VERIFY OTP : Valider le code reçu par email */
function verifyOTP(){
  const otpValue = document.getElementById("otp").value;

  if(!otpValue){
    alert("Entrez le code reçu");
    return;
  }

  const data = {
    email: emailGlobal,
    code: otpValue
  };

  fetch("https://connexion-financiere.onrender.com/api/verify", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
  .then(async (res) => {
    const result = await res.json();
    if(result.status === "VERIFIED"){
      document.getElementById("otpBox").style.display = "none";
      document.getElementById("success").classList.remove("hidden");
    } else {
      alert("❌ Code OTP invalide ou expiré.");
    }
  })
  .catch((err)=>{
    console.error(err);
    alert("❌ Erreur lors de la vérification.");
  });
}
</script>

</body>
</html>
