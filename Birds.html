<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion Financière</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a1f44, #111);
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .cta {
      margin-top: 20px;
      padding: 15px 25px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 8px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      border-radius: 10px;
      cursor: pointer;
    }

    .form-box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
      display: none;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #d4af37;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Connexion Financière</h1>
  <p>Opportunités financières et emploi au Canada</p>
  <button class="cta" onclick="start()">Commencer</button>
</div>

<!-- CHOIX -->
<div class="section hidden" id="choice">
  <h2>Choisissez votre objectif</h2>

  <div class="card" onclick="setType('client')">💰 Finances</div>
  <div class="card" onclick="setType('emploi')">👥 Emploi</div>
</div>

<!-- FORM -->
<div class="section">
  <div class="form-box" id="form">

    <input type="text" id="name" placeholder="Nom complet">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="Téléphone">

    <select id="gender">
      <option value="">Sexe</option>
      <option>Homme</option>
      <option>Femme</option>
    </select>

    <select id="status">
      <option>Étudiant</option>
      <option>Travailleur</option>
      <option>Résident permanent</option>
      <option>Citoyen</option>
    </select>

    <select id="location">
      <option>Zoom</option>
      <option>Laval</option>
    </select>

    <label>
      <input type="checkbox" id="consent"> Accepte contact
    </label>

    <button onclick="submitForm()">Recevoir code</button>
  </div>

  <!-- OTP -->
  <div class="form-box hidden" id="otpBox">
    <input type="text" id="otp" placeholder="Code OTP">
    <button onclick="verifyOTP()">Valider</button>
  </div>

  <!-- SUCCESS -->
  <div class="hidden" id="success">
    <h2>Merci ✅</h2>
    <p>Nous vous contacterons bientôt</p>
  </div>
</div>

<script>

let type = "";
let emailGlobal = "";

/* START */
function start(){
  document.querySelector(".hero").style.display = "none";
  document.getElementById("choice").classList.remove("hidden");
}

/* TYPE */
function setType(t){
  type = t;
  document.getElementById("form").style.display = "block";
}

/* SUBMIT */
function submitForm(){

  const data = {
    name: name.value,
    email: email.value,
    phone: phone.value,
    gender: gender.value,
    status: status.value,
    location: location.value,
    consent: consent.checked,
    type: type
  };

  if(!data.name || !data.email || !data.phone || !data.gender){
    alert("Remplis tous les champs");
    return;
  }

  emailGlobal = data.email;

  fetch("https://connexion-financiere.onrender.com/api/prospect", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })
  .then(()=>{
    document.getElementById("form").style.display="none";
    document.getElementById("otpBox").classList.remove("hidden");
  })
  .catch(()=>alert("Erreur"));
}

/* VERIFY */
function verifyOTP(){

  const data = {
    email: emailGlobal,
    code: otp.value
  };

  fetch("https://connexion-financiere.onrender.com/api/verify", {
    method:"POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify(data)
  })
  .then(()=>{
    document.getElementById("otpBox").style.display="none";
    document.getElementById("success").classList.remove("hidden");
  })
  .catch(()=>alert("Code invalide"));
}

</script>

</body>
</html>
